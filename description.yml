# Metadata for duckdb/community-extensions registration.
extension:
  name: vindex
  description: |
    Vector similarity search for DuckDB. Supports HNSW, IVF, DiskANN, and
    AiSAQ indexes with pluggable quantization (flat, RaBitQ, PQ, ScaNN);
    RaBitQ at 3 bits delivers >99% Recall@10 on SIFT1M with an
    optimizer-level rerank pass. AiSAQ pages PQ codes from storage on
    demand via DuckDB's BlockManager, enabling indexing datasets larger
    than RAM.
  version: 0.2.0
  language: C++
  build: cmake
  license: MIT
  maintainers:
    - Icemap

repo:
  github: Icemap/duckdb-vector-index
  ref: v0.2.0

docs:
  # Community-extensions serves these on duckdb.org/community_extensions/
  hello_world: |
    INSTALL vindex FROM community;
    LOAD vindex;

    CREATE TABLE docs (id INT, embedding FLOAT[128]);
    CREATE INDEX docs_idx ON docs USING HNSW (embedding)
      WITH (metric='l2sq', quantizer='rabitq', bits=3);

    SELECT id
    FROM docs
    ORDER BY array_distance(embedding, [0.0, 0.1, ... ]::FLOAT[128])
    LIMIT 10;
